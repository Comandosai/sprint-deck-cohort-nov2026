# Qdrant — vector database для долгосрочной памяти бота через Mem0.
# Источник: qdrant.tech/documentation/guides/installation/, блок-15-mem0-память.md.
#
# Запуск на VPS:
#   cd ~/.openclaw/
#   docker compose -f docker-compose.qdrant.yml up -d
#
# REST API: http://127.0.0.1:6333
# gRPC:     127.0.0.1:6334
# Web UI:   http://127.0.0.1:6333/dashboard (доступ через SSH-туннель -L 6333:127.0.0.1:6333)

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openclaw-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # REST — биндим только на localhost!
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      # Логирование
      QDRANT__LOG_LEVEL: INFO
      # Telemetry off — приватность
      QDRANT__TELEMETRY_DISABLED: "true"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      # 4 GB persistent volume — растёт по мере накопления векторов
      device: /home/clawd/.openclaw/qdrant-data
